<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; padding: 40px; font-family: 'Sora', sans-serif; }
a { cursor: pointer; }
a text:hover { fill: #93c5fd; text-decoration: underline; }
</style>
<title>Exclusão de Boletos em Massa</title>
</head>
<body>
<svg width="1150" height="1500" viewBox="0 0 1150 1500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
  </marker>
  <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
  </marker>
  <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
  </marker>
  <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
  </marker>
  <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
</defs>

<rect x="200" y="20" width="700" height="36" rx="18" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
<text x="550" y="43" text-anchor="middle" font-family="Space Mono" font-size="11" fill="#93c5fd" font-weight="700" letter-spacing="1">EXCLUSÃO EM MASSA DE BOLETOS ASAAS</text>

<rect x="400" y="86" width="300" height="44" rx="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
<text x="550" y="113" text-anchor="middle" font-family="Sora" font-size="13" font-weight="700" fill="#93c5fd">🟢 INÍCIO</text>
<line x1="550" y1="130" x2="550" y2="180" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>


<rect x="200" y="180" width="700" height="36" rx="18" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
<text x="550" y="203" text-anchor="middle" font-family="Space Mono" font-size="11" fill="#93c5fd" font-weight="700" letter-spacing="1">ETAPA DE DISPARO INICIAL</text>
<line x1="550" y1="216" x2="550" y2="246" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="340" y="246" width="420" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="268" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Enviar um e-mail para o mailing da Master</text>
<text x="550" y="284" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">c/ explicação do processo e planilha em anexo</text>
<line x1="550" y1="302" x2="550" y2="332" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="290" y="332" width="520" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="352" text-anchor="middle" font-family="Sora" font-size="10" fill="#60a5fa" font-weight="600">ESTRUTURA DA PLANILHA DEVERÁ CONTER:</text>
<text x="550" y="368" text-anchor="middle" font-family="Sora" font-size="10" fill="#94a3b8">• Nome da franquia</text>
<text x="550" y="384" text-anchor="middle" font-family="Sora" font-size="10" fill="#94a3b8">• CNPJ da franquia</text>
<text x="550" y="400" text-anchor="middle" font-family="Sora" font-size="10" fill="#94a3b8">• CPF do locatário</text>
<text x="550" y="416" text-anchor="middle" font-family="Sora" font-size="10" fill="#94a3b8">• Valor do boleto</text>
<text x="550" y="432" text-anchor="middle" font-family="Sora" font-size="10" fill="#94a3b8">• Data de exclusão (a partir de quando os boletos poderão ser excluídos)</text>
<line x1="550" y1="452" x2="550" y2="500" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="370" y="500" width="360" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="522" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">O e-mail deverá incluir em cópia:</text>
<text x="550" y="538" text-anchor="middle" font-family="Sora" font-size="11" fill="#60a5fa" font-weight="600">Suporte, Alves e Mailing da Informind</text>
<line x1="550" y1="556" x2="550" y2="586" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="340" y="586" width="420" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="612" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Solicitar prazo de até 3 dias úteis para devolutiva</text>
<line x1="550" y1="630" x2="550" y2="660" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<polygon points="550,660 730,710 550,760 370,710" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="703" text-anchor="middle" font-family="Sora" font-size="11" font-weight="600" fill="#c7d2fe">Master retornou a</text>
<text x="550" y="719" text-anchor="middle" font-family="Sora" font-size="11" font-weight="600" fill="#c7d2fe">planilha preenchida?</text>

<line x1="730" y1="710" x2="800" y2="710" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
<text x="765" y="703" text-anchor="middle" font-family="Space Mono" font-size="8" fill="#ef4444" font-weight="700">NÃO</text>
<rect x="800" y="688" width="200" height="44" rx="8" fill="#2d1515" stroke="#ef4444" stroke-width="1.5" filter="url(#sh)"/>
<text x="900" y="714" text-anchor="middle" font-family="Sora" font-size="10" fill="#fca5a5">Aguardar / Cobrar Master</text>
<line x1="900" y1="688" x2="900" y2="640" stroke="#334155" stroke-width="1.5"/>
<line x1="900" y1="640" x2="550" y2="640" stroke="#334155" stroke-width="1.5"/>
<line x1="550" y1="640" x2="550" y2="660" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<line x1="550" y1="760" x2="550" y2="790" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrG)"/>
<rect x="524" y="764" width="52" height="18" rx="9" fill="#10b981"/>
<text x="550" y="776" text-anchor="middle" font-family="Space Mono" font-size="8" fill="white" font-weight="700">SIM</text>


<rect x="200" y="790" width="700" height="36" rx="18" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
<text x="550" y="813" text-anchor="middle" font-family="Space Mono" font-size="11" fill="#93c5fd" font-weight="700" letter-spacing="1">ENCAMINHAMENTO PARA EXECUÇÃO</text>
<line x1="550" y1="826" x2="550" y2="856" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="370" y="856" width="360" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="882" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Responder no mesmo e-mail</text>
<line x1="550" y1="900" x2="550" y2="930" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="370" y="930" width="360" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="956" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Sinalizar o Alves para dar continuidade à exclusão</text>
<line x1="550" y1="974" x2="550" y2="1004" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>


<rect x="200" y="1004" width="700" height="36" rx="18" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
<text x="550" y="1027" text-anchor="middle" font-family="Space Mono" font-size="11" fill="#93c5fd" font-weight="700" letter-spacing="1">CONFIRMAÇÃO DA EXECUÇÃO</text>
<line x1="550" y1="1040" x2="550" y2="1070" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="370" y="1070" width="360" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="1092" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Alves responde no mesmo e-mail</text>
<text x="550" y="1108" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">informando que o processo foi concluído</text>
<line x1="550" y1="1126" x2="550" y2="1156" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>


<rect x="200" y="1156" width="700" height="36" rx="18" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
<text x="550" y="1179" text-anchor="middle" font-family="Space Mono" font-size="11" fill="#93c5fd" font-weight="700" letter-spacing="1">VALIDAÇÃO FINAL</text>
<line x1="550" y1="1192" x2="550" y2="1222" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="320" y="1222" width="460" height="56" rx="8" fill="#0f2d1e" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="1244" text-anchor="middle" font-family="Sora" font-size="11" fill="#6ee7b7">Solicitar à equipe da Master que verifique a exclusão</text>
<text x="550" y="1260" text-anchor="middle" font-family="Sora" font-size="11" fill="#6ee7b7">e confirme a validação do processo</text>
<line x1="550" y1="1278" x2="550" y2="1308" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="400" y="1308" width="300" height="44" rx="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
<text x="550" y="1335" text-anchor="middle" font-family="Sora" font-size="13" font-weight="700" fill="#93c5fd">🔴 FIM DO PROCESSO</text>

</svg>
</body>
</html>
