<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; padding: 40px; font-family: 'Sora', sans-serif; }
a { cursor: pointer; }
a text:hover { fill: #93c5fd; text-decoration: underline; }
</style>
</head>
<body>
<svg width="1150" height="1000" viewBox="0 0 1150 1000" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
  </marker>
  <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
  </marker>
  <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
  </marker>
  <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
  </marker>
  <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
</defs>

<rect x="200" y="20" width="700" height="36" rx="18" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
<text x="550" y="43" text-anchor="middle" font-family="Space Mono" font-size="11" fill="#93c5fd" font-weight="700" letter-spacing="1">CONTROLE DE MÓDULOS</text>

<rect x="400" y="76" width="300" height="44" rx="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
<text x="550" y="103" text-anchor="middle" font-family="Sora" font-size="13" font-weight="700" fill="#93c5fd">🟢 INÍCIO</text>
<line x1="550" y1="120" x2="550" y2="140" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="370" y="140" width="360" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="157" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Master contacta o suporte solicitando</text>
<text x="550" y="173" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">o controle dos módulos</text>
<line x1="550" y1="184" x2="550" y2="204" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="330" y="204" width="440" height="72" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="222" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Enviar a planilha</text>
<text x="550" y="238" text-anchor="middle" font-family="Sora" font-size="11" fill="#60a5fa" font-weight="600">"Modelo_Permissoes_Usuarios_Visiun.xlsx"</text>
<text x="550" y="254" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">(msg rápida "Controle de Módulos")</text>
<text x="550" y="270" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">solicitando o preenchimento adequado</text>
<line x1="550" y1="276" x2="550" y2="296" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="370" y="296" width="360" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="322" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Master retorna a planilha preenchida</text>
<line x1="550" y1="340" x2="550" y2="360" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="370" y="360" width="360" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="377" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Verificar se todos os e-mails estão</text>
<text x="550" y="393" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">cadastrados no sistema</text>
<line x1="550" y1="404" x2="550" y2="424" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<polygon points="550,424 720,474 550,524 380,474" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="468" text-anchor="middle" font-family="Sora" font-size="11" font-weight="600" fill="#c7d2fe">Existe(m) e-mail(s)</text>
<text x="550" y="484" text-anchor="middle" font-family="Sora" font-size="11" font-weight="600" fill="#c7d2fe">não cadastrado(s)?</text>

<line x1="720" y1="474" x2="800" y2="474" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrG)"/>
<rect x="734" y="465" width="52" height="18" rx="9" fill="#10b981"/>
<text x="760" y="477" text-anchor="middle" font-family="Space Mono" font-size="8" fill="white" font-weight="700">SIM</text>

<rect x="800" y="446" width="240" height="56" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="920" y="464" text-anchor="middle" font-family="Sora" font-size="10" fill="#94a3b8">Informar à master todos os</text>
<text x="920" y="480" text-anchor="middle" font-family="Sora" font-size="10" fill="#94a3b8">e-mails que precisam</text>
<text x="920" y="496" text-anchor="middle" font-family="Sora" font-size="10" fill="#94a3b8">ser cadastrados</text>
<line x1="920" y1="502" x2="920" y2="522" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="800" y="522" width="240" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="920" y="548" text-anchor="middle" font-family="Sora" font-size="10" fill="#94a3b8">Usuários restantes são cadastrados</text>
<line x1="920" y1="566" x2="920" y2="586" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="800" y="586" width="240" height="44" rx="8" fill="#0f2d1e" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
<text x="920" y="612" text-anchor="middle" font-family="Sora" font-size="10" fill="#6ee7b7">Liberar todos os acessos</text>

<line x1="920" y1="630" x2="920" y2="670" stroke="#334155" stroke-width="1.5"/>
<line x1="920" y1="670" x2="550" y2="670" stroke="#334155" stroke-width="1.5"/>


<line x1="550" y1="524" x2="550" y2="690" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="524" y="534" width="52" height="18" rx="9" fill="#1e293b" stroke="#334155"/>
<text x="550" y="546" text-anchor="middle" font-family="Space Mono" font-size="8" fill="#94a3b8" font-weight="700">NÃO</text>


<rect x="370" y="690" width="360" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="707" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Realizar o controle dos módulos de</text>
<text x="550" y="723" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">cada usuário baseado na planilha</text>
<line x1="550" y1="734" x2="550" y2="754" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="370" y="754" width="360" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
<text x="550" y="780" text-anchor="middle" font-family="Sora" font-size="11" fill="#94a3b8">Relatar à master que a tarefa foi concluída</text>
<line x1="550" y1="798" x2="550" y2="818" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="400" y="818" width="300" height="44" rx="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
<text x="550" y="845" text-anchor="middle" font-family="Sora" font-size="13" font-weight="700" fill="#93c5fd">🔴 FIM DO FLUXO</text>

</svg>
</body>
</html>
